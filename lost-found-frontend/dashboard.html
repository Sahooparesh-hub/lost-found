<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Lost & Found</title>
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="dashboard-layout">

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="sidebar-logo">
Lost<span>&</span>Found
</div>

<nav class="sidebar-menu">

<a href="dashboard.html">🏠 Dashboard</a>

<a href="post-item.html">➕ Post Item</a>

<a href="found-items.html">🔍 Found Items</a>

<a href="messages.html">💬 Messages</a>

<a href="profile.html">👤 Profile</a>

</nav>

</aside>


<!-- MAIN AREA -->
<div class="main-content">

<header class="topbar">

    
<input type="text" id="searchInput" placeholder="Search lost items...">

<button id="categoryBtn">Category</button>

</header>

<div id="categoryDropdown" class="category-dropdown hidden">

<button class="category-chip" data-category="all">All</button>

<button class="category-chip" data-category="Electronics">Electronics</button>

<button class="category-chip" data-category="Documents">Documents</button>

<button class="category-chip" data-category="Clothing">Clothing</button>

<button class="category-chip" data-category="Accessories">Accessories</button>

<button class="category-chip" data-category="Bags">Bags</button>

<button class="category-chip" data-category="Others">Others</button>

</div>

<section class="stats">

<div class="stat-card">
<h3>Total Items</h3>
<p id="totalItems">0</p>
</div>

<div class="stat-card">
<h3>Lost Items</h3>
<p id="lostItems">0</p>
</div>

<div class="stat-card">
<h3>Found Items</h3>
<p id="foundItems">0</p>
</div>

</section>


<section class="items-section">

<h2>Latest Items</h2>

<div id="itemsContainer"></div>

</section>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
