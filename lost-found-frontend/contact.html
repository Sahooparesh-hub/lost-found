<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Owner | Lost & Found</title>

<link rel="stylesheet" href="css/contact.css">

</head>

<body>

<div class="page-wrapper">

<div class="contact-container">

<div class="contact-header">

<h2>Contact Item Owner</h2>

<p>Send your details to claim or inquire about this item.</p>

</div>

<div id="messageBox" class="message-box" style="display:none;"></div>

<form id="contactForm">

<div class="input-group">

<label>Your Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>

</div>


<div class="input-group">

<label>Phone or Email</label>
<input type="text" id="contact" placeholder="Enter phone number or email" required>

</div>


<div class="input-group">

<label>Describe the item briefly</label>

<textarea id="description"
placeholder="Example: Black wallet with student ID inside"
rows="3"
required></textarea>

<div class="word-counter">

<span id="count">0</span>/20 words

</div>

</div>


<button type="submit" class="submit-btn">

Send Message

</button>

</form>

</div>

</div>

<script src="contact.js"></script>

</body>

</html>
