<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Item Details</title>

<link rel="stylesheet" href="css/item-details.css">

</head>

<body>

<div class="details-container">

<div class="image-section">
<img id="itemImage">
</div>

<div class="info-section">

<h1 id="itemName"></h1>

<div class="status" id="itemStatus"></div>

<div class="info-grid">

<p><strong>Category:</strong> <span id="itemCategory"></span></p>

<p><strong>Location:</strong> <span id="itemLocation"></span></p>

<p><strong>Date:</strong> <span id="itemDate"></span></p>

<p><strong>Owner:</strong> <span id="ownerName"></span></p>

</div>

<div class="description">
<h3>Description</h3>
<p id="itemDescription"></p>
</div>


</div>

</div>

<script src="item-details.js"></script>

</body>

</html>
