<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Profile</title>
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<div class="profile-page-wrapper">
    <div class="form-container">
        <form id="updateForm">
            <h2 style="margin-bottom:20px;">Update Profile</h2>
            <div id="messageBox" class="message-box"></div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-group">
                    <label>Phone</label>
                    <input type="text" id="phone" required>
                </div>

                <div class="input-group">
                    <label>New Password (Optional)</label>
                    <input type="password" id="password">
                </div>
            </div>

            <div class="button-actions" style="margin-top:30px;">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="button" onclick="window.location.href='profile.html'" class="btn btn-logout">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<script src="update-profile.js"></script>
</body>
</html>
