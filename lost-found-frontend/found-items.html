<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Found Items | Lost & Found</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/found-items.css">

</head>

<body>

<header class="dashboard-header">

<div class="left-section">
<div class="logo-text">Lost<span>&</span>Found</div>
</div>

<div class="search-bar-container">

<input type="text" id="foundSearchInput" placeholder="Search found items">

<button id="foundCategoryBtn">Category ▼</button>

</div>

</header>


<div id="foundCategoryDropdown" class="category-dropdown hidden">

<button class="category-chip" data-category="all">All</button>
<button class="category-chip" data-category="Electronics">Electronics</button>
<button class="category-chip" data-category="Documents">Documents</button>
<button class="category-chip" data-category="Clothing">Clothing</button>
<button class="category-chip" data-category="Accessories">Accessories</button>
<button class="category-chip" data-category="Bags">Bags</button>
<button class="category-chip" data-category="Others">Others</button>

</div>


<section class="page-title-section">

<div class="container">

<h1>Recovered & Found Items</h1>

<p>Browse items that have been found.</p>

</div>

</section>


<main class="content-area">

<div id="foundItemsGrid" class="items-grid"></div>

</main>


<script src="found-items.js"></script>

</body>
</html>
