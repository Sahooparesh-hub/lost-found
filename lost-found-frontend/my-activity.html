<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Activity | Lost & Found</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/my-activity.css">

</head>
<body>

<header class="dashboard-header">
    <div class="left-section">
        <div class="logo-text" onclick="location.href='dashboard.html'" style="cursor:pointer">
            Lost<span>&</span>Found
        </div>
    </div>

    <div class="right-section">
        <a href="profile.html" class="top-profile-btn">Back to Profile</a>
    </div>
</header>

<main class="activity-container">

    <div class="activity-header">
        <h1>My Activity History</h1>
        <p>Track the items you have reported or found.</p>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="activity-summary">

        <div class="summary-box lost-summary">
            <h3 id="lostCount">0</h3>
            <p>Lost Items</p>
        </div>

        <div class="summary-box found-summary">
            <h3 id="foundCount">0</h3>
            <p>Found Items</p>
        </div>

    </div>

    <!-- FILTER BUTTONS -->
    <div class="activity-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="lost">Lost Items</button>
        <button class="filter-btn" data-filter="found">Found Items</button>
    </div>

    <!-- ITEMS -->
    <div class="activity-list" id="activityList"></div>

</main>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast"></div>

<script src="my-activity.js"></script>

</body>
</html>
